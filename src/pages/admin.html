<!DOCTYPE html>
<html lang="zh-Hant">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="robots" content="noindex" />
    <title>戰術少女研究室 - 核心中央控制台</title>

    <script>
      const SUPABASE_URL = "https://empqrgbetwqtsmbbpzlo.supabase.co"; 
      // 🔐 請記得替換為你真正的 Publishable key (anon public)
      const SUPABASE_ANON_KEY = "sb_publishable_1-GjWCdJmIEkNcX5DadxgQ_VUaGKOBg"; 

      window.netlifyIdentity = {
        on: (event, callback) => {
          if (event === 'init') callback(null);
        },
        
        // 💡 關鍵修正：補上 Decap CMS 初始化時必備的 currentUser 檢查函式
        currentUser: () => {
          const userStr = localStorage.getItem("netlify-cms-user");
          if (!userStr) return null;
          try {
            const user = JSON.parse(userStr);
            // 模擬 Netlify CMS 需要的 token 結構
            return {
              jwt: () => Promise.resolve(user.token),
              logout: () => {
                localStorage.removeItem("netlify-cms-user");
                window.location.reload();
              }
            };
          } catch (e) {
            return null;
          }
        },

        open: () => {
          const email = prompt("🔒 請輸入管理員 Email：");
          if (!email) return;
          const password = prompt("🔑 請輸入管理員 密碼：");
          if (!password) return;
          
          fetch(`${SUPABASE_URL}/auth/v1/token?grant_type=password`, {
            method: "POST",
            headers: {
              "Content-Type": "application/json",
              "apikey": SUPABASE_ANON_KEY
            },
            body: JSON.stringify({ email, password })
          })
          .then(res => res.json())
          .then(data => {
            if (data.access_token) {
              // 登入成功：將權限令牌注入
              localStorage.setItem("netlify-cms-user", JSON.stringify({
                backendName: "git-gateway",
                token: data.access_token,
                raw_user_meta_data: {}
              }));
              window.location.reload(); 
            } else {
              alert("❌ 登入失敗：" + (data.msg || "帳號或密碼錯誤。"));
            }
          })
          .catch(err => alert("⚠️ 連線安全金庫失敗：" + err));
        },

        logout: () => {
          localStorage.removeItem("netlify-cms-user");
          window.location.reload();
        }
      };
    </script>
  </head>
  <body>
    <script src="https://unpkg.com/decap-cms@^3.0.0/dist/decap-cms.js"></script>
  </body>
</html>

<!DOCTYPE html>
<html lang="zh-Hant">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="robots" content="noindex" />
    <title>戰術少女研究室 - 核心中央控制台</title>
    
    <style>
      body { background-color: #f3f4f6; font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
      .login-box { background: white; padding: 2rem; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); text-align: center; max-width: 360px; width: 100%; position: relative; z-index: 9999; }
      input { width: 100%; padding: 0.75rem; margin: 0.5rem 0; border: 1px solid #d1d5db; border-radius: 4px; box-sizing: border-box; }
      button { width: 100%; padding: 0.75rem; background: #ec4899; color: white; border: none; border-radius: 4px; font-weight: bold; cursor: pointer; }
      button:hover { background: #db2777; }
      .loading { display: none; color: #6b7280; margin-top: 1rem; font-size: 0.9rem; }
    </style>
  </head>
  <body>

    <div id="auth-gate" class="login-box">
      <h3 style="color: #374151; margin-bottom: 1.5rem;">🔒 戰術核心中央控制台</h3>
      <input type="email" id="email" placeholder="管理員電子郵件" value="tacticalshojo@gmail.com" required />
      <input type="password" id="password" placeholder="管理員認證密碼" required />
      <button id="login-btn" onclick="secureLogin()">驗證登入</button>
      <div id="loading-text" class="loading">⏳ 正在連線 Vercel 自建防線...</div>
    </div>

    <script>
      async function secureLogin() {
        const email = document.getElementById('email').value;
        const password = document.getElementById('password').value;
        const btn = document.getElementById('login-btn');
        const loading = document.getElementById('loading-text');

        btn.disabled = true;
        loading.style.display = "block";

        try {
          // 📡 直接呼叫同網域下的 Astro 本地後端 API，100% 自主控管
          const response = await fetch('/api/login', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ email, password })
          });

          const data = await response.json();

          if (data.success && data.token) {
            // 後端核對成功，將發放的 GitHub Token 寫入 LocalStorage 快取，直接解鎖 CMS
            localStorage.setItem("netlify-cms-user", JSON.stringify({
              backendName: "github",
              token: data.token,
              raw_user_meta_data: {}
            }));
            
            document.getElementById('auth-gate').style.display = 'none';
            loadCMS();
          } else {
            alert("❌ 驗證失敗：" + (data.message || "帳號或密碼錯誤。"));
            resetBtn();
          }
        } catch (err) {
          alert("⚠️ 連線自建伺服器失敗：" + err);
          resetBtn();
        }
      }

      function resetBtn() {
        document.getElementById('login-btn').disabled = false;
        document.getElementById('loading-text').style.display = "none";
      }

      function loadCMS() {
        if (window.CMS) return;
        const script = document.createElement('script');
        script.src = "https://unpkg.com/decap-cms@^3.0.0/dist/decap-cms.js";
        document.body.appendChild(script);
      }

      // 自動判定：如果先前就登入過且金鑰還在，直接放行進後台
      if (localStorage.getItem("netlify-cms-user")) {
        document.getElementById('auth-gate').style.display = 'none';
        loadCMS();
      }
    </script>
  </body>
</html>

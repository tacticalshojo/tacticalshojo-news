name: ⚔️ TinaCMS 雲端自動化編編譯與快取刷新

on:
  push:
    branches:
      - main

jobs:
  tina-cloud-trigger:
    runs-on: ubuntu-latest

    steps:
      - name: 🛰️ 步驟 1：檢出儲存庫代碼
        uses: actions/checkout@v4

      - name: 🟢 步驟 2：部署 Node 24 環境
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: 📦 步驟 3：安裝專案依賴套件
        run: npm install

      - name: 🔨 步驟 4：執行純離線編編譯 (徹底切斷外網驗證阻礙)
        run: npx tinacms build --local
        env:
          TINA_TOKEN: "local-placeholder"

# 💡 改用 proxy 模式，徹底斷開與 GitHub 線上認證的糾纏
backend:
  name: proxy
  proxy_url: http://localhost:8081/api

media_folder: "public/images/uploads"
public_folder: "/images/uploads"

collections:
  - name: "authors"
    label: "✍️ 編輯部作家管理"
    folder: "src/content/authors"
    create: true
    extension: "json"
    format: "json"
    slug: "{{slug}}"
    fields:
      - { label: "作者代號 (英文/不可重複，會作為檔案名稱)", name: "id", widget: "string" }
      - { label: "作者完整暱稱", name: "name", widget: "string" }
      - { label: "作者大頭貼", name: "avatar", widget: "image", required: false }
      - { label: "作者簡介 (顯示於文末卡片)", name: "bio", widget: "text" }

  - name: "blog"
    label: "📰 戰術新聞通報"
    folder: "src/content/blog"
    create: true
    slug: "{{slug}}"
    fields:
      - { label: "新聞標題", name: "title", widget: "string" }
      - { label: "網址路徑 (Slug)", name: "slug", widget: "string" }
      - { label: "發布日期", name: "date", widget: "datetime", format: "YYYY-MM-DD HH:mm:ss" }
      
      - label: "指定作者"
        name: "authors"
        widget: "relation"
        collection: "authors"
        search_fields: ["name"]
        value_field: "id"
        display_fields: ["name"]
        multiple: true

      - { label: "新聞大分類", name: "category", widget: "select", options: ["軍事戰略", "全民防衛", "戰術自訓", "軍工產業", "軍風搜奇"] }
      - { label: "登上頭條大圖輪播區 (Hero Banner)", name: "isHeroBanner", widget: "boolean", default: false }
      - { label: "標記為焦點熱門文章", name: "isFeatured", widget: "boolean", default: false }
      - { label: "放入頂部臨時熱門專題橫幅", name: "isHotTopic", widget: "boolean", default: false }
      - { label: "新聞首圖", name: "heroImage", widget: "image", required: false }
      - { label: "首圖圖說", name: "heroImageCaption", widget: "string", required: false }
      - { label: "新聞導言 / 前言摘要", name: "summary", widget: "text" }
      - { label: "文內附加隨文圖片集", name: "gallery", widget: "list", required: false, fields: [
          { label: "附加圖片", name: "image", widget: "image" },
          { label: "圖片描述/圖說", name: "caption", widget: "string" }
        ]}
      - { label: "詳細新聞內文 (可切換富文本編輯或直接貼 HTML 嵌入碼)", name: "body", widget: "markdown" }
